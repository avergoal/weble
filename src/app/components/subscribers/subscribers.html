<div class="my_subscribers_modal active">
  <div class="row">
    <div class="create_post_top center_edges m_b_0">
      <div class="create_post_top_left left_centr ">
        <a  (click)="_location.back()"><span class="arrow_exit"></span></a>
        <div class="arrow_exit_text">{{'Subscribers'|translate}}</div>
      </div>
    </div>
    <div class="search_group_perent anti_row left_centr active"

    >
      <div class="search_group left_centr">
        <div class="search_img_perents">
          <input class="search_img" type="submit">
        </div>
        <div class="entry_search_perent">
          <input class="entry_search"  [(ngModel)]="search_text" placeholder="{{'Search'|translate}}" type="text">
        </div>
      </div>
    </div>
    <div
      infinite-scroll
      [infiniteScrollDistance]="1"
      [infiniteScrollUpDistance]="20"
      [infiniteScrollThrottle]="20"
      (scrolled)="getSubscribe()"
    >
      <app-short-list
        [filter]="{text:search_text}"
        *ngFor="let item of subscribers"
        [user]="item"
      ></app-short-list>
    </div>

  </div>
</div>
