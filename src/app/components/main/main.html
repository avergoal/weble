<div class="pers_page_color">
  <div class="main-wrap-post">
    <main-head></main-head>
    <app-newpost *ngIf="postService.mainPost" (event)="clearAll()"></app-newpost>
    <div *ngIf="!modS.activeModCh_id"
         infinite-scroll
         [infiniteScrollContainer]="'.main-wrap-post'"
         [fromRoot]="true"
         (scrolled)="getPost()"
         [scrollWindow]="false"
    >
      <app-post-view *ngFor="let post of posts"
                     [post]="post"
      ></app-post-view>
    </div>
  </div>
  <app-footer></app-footer>

</div>
