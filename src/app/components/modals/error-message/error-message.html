<div class="unsubscribe_modal modal" *ngIf="mS.errorModal.view" style="display: block">
    <div class="modal_opacity"></div>
    <div class="unsubscribe_block column_centr">
        <div class="ic">
            <svg xmlns="http://www.w3.org/2000/svg" id="spoiler" width="48" height="48" viewBox="0 0 48 48">
                <defs>
                    <style>
                        .cls-1{fill:none}.cls-2{fill:#c90a0a}
                    </style>
                </defs>
                <g id="Layer_1" data-name="Layer 1">
                    <path id="Rectangle_351" d="M0 0h48v48H0z" class="cls-1" data-name="Rectangle 351"/>
                    <path id="Path_283" d="M41.047 35.979l-18-32a1.56 1.56 0 0 0-2.6 0l-18 32a1.54 1.54 0 0 0 0 1.5 1.52 1.52 0 0 0 1.3.74h36a1.52 1.52 0 0 0 1.3-.74 1.54 1.54 0 0 0 0-1.5zm-34.74-.76l15.44-27.44 15.44 27.44z" class="cls-2" data-name="Path 283" transform="translate(2.253 3.281)"/>
                    <path id="Path_284" d="M11.25 10.75v8a1.5 1.5 0 1 0 3 0v-8a1.5 1.5 0 1 0-3 0z" class="cls-2" data-name="Path 284" transform="translate(11.25 9.25)"/>
                    <path id="Path_285" d="M11.69 16.681a1.5 1.5 0 1 0 2.12 0 1.54 1.54 0 0 0-2.12 0z" class="cls-2" data-name="Path 285" transform="translate(11.25 16.259)"/>
                </g>
            </svg>
        </div>
        <div class="unsubscribe_name">{{'Something_wrong'|translate}}</div>
        <div class="unsubscribe_text">
            <p>{{'errors._'+mS.errorModal.text|translate}}</p>
        </div>
        <div class="unsubscribe_text indent">
            <button class="btn" (click)="mS.closeErrorModal()">OK</button>
        </div>
    </div>
</div>
